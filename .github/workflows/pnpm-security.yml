name: pnpm security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frozen-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Prepare pnpm
        run: corepack prepare pnpm@11.1.1 --activate
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
