replicaCount: 1

nameOverride: ""
fullnameOverride: ""
revisionHistoryLimit: 3

image:
  repository: ghcr.io/plastic-labs/honcho
  pullPolicy: IfNotPresent
  tag: "v3.0.7"

imagePullSecrets: []

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 101

config:
  env:
    LOG_LEVEL: INFO
    DB_POOL_PRE_PING: "true"
    DB_POOL_SIZE: "10"
    DB_MAX_OVERFLOW: "20"
    CACHE_ENABLED: "true"
    VECTOR_STORE_TYPE: pgvector
    VECTOR_STORE_MIGRATED: "false"
    AUTH_USE_AUTH: "false"
    METRICS_ENABLED: "true"
    METRICS_NAMESPACE: honcho
    SENTRY_ENABLED: "false"
    TELEMETRY_ENABLED: "false"

runtimeSecret:
  enabled: false
  name: ""

extraEnv: []
extraEnvFrom: []

waitForDependencies:
  enabled: true
  image: busybox:1.36

database:
  host: ""
  port: 5432

cnpg:
  enabled: false
  fullnameOverride: ""
  description: Dedicated PostgreSQL pgvector cluster for Honcho
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  imagePullSecrets: []
  instances: 2
  database: honcho
  owner: honcho
  credentialsSecret:
    name: ""
  postInitApplicationSQL:
    - CREATE EXTENSION IF NOT EXISTS vector;
  storage:
    storageClass: ""
    size: 20Gi
  walStorage:
    storageClass: ""
    size: 10Gi
  monitoring:
    enablePodMonitor: true
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi
  backup: {}
  postgresql: {}

redis:
  enabled: true
  fullnameOverride: ""
  image:
    repository: redis
    tag: "8.2"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  auth:
    enabled: false
    secretName: ""
    secretKey: REDIS_PASSWORD
  persistence:
    enabled: false
    storageClass: ""
    size: 2Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

migration:
  enabled: true
  command:
    - /app/.venv/bin/python
    - scripts/provision_db.py
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

api:
  replicaCount: 1
  command:
    - fastapi
    - run
    - --host
    - 0.0.0.0
    - src/main.py
  startupProbe:
    httpGet:
      path: /health
      port: http
    failureThreshold: 30
    periodSeconds: 5
    timeoutSeconds: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

deriver:
  replicaCount: 1
  command:
    - /app/.venv/bin/python
    - -m
    - src.deriver
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: honcho.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

monitoring:
  podMonitor:
    enabled: false
    namespace: ""
    labels: {}
    path: /metrics
    interval: 30s
    scrapeTimeout: 25s

networkPolicy:
  enabled: false
  defaultDeny: false
  allowExternalHttps: true
  dnsIpBlocks: []
  apiIngressFrom:
    - {}

nodeSelector: {}
tolerations: []
affinity: {}
