apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "honcho.fullname" . }}-test-health"
  labels:
    {{- include "honcho.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
      args:
        - -qO-
        - http://{{ include "honcho.fullname" . }}-api:{{ .Values.service.port }}/health
